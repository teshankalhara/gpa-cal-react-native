name: Deploy Production Builds

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Create credentials.json
        run: |
          echo '${{ secrets.CREDENTIALS_JSON }}' > credentials.json

      - name: Build for Android
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        run: eas build --platform android --profile ${{ github.event.inputs.build_type || 'production' }} --non-interactive

  notify:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    
    steps:
      - name: Build Status Notification
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ Build completed successfully!"
          else
            echo "❌ Build failed!"
          fi
